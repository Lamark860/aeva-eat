services:
  postgres:
    image: postgres:16-alpine
    container_name: aeva-postgres-prod
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Лимиты — потолки (cap, не reservation): защищают соседей по общему VPS от
    # runaway-контейнера; нормальное потребление камерного приложения сильно ниже.
    mem_limit: 768m
    cpus: "1.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aeva-backend-prod
    env_file: .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET}
      API_PORT: 8085
      GEOSUGGEST_KEY: ${GEOSUGGEST_KEY}
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 512m   # потолок с запасом под пиковую обработку изображений
    cpus: "1.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_YANDEX_MAPS_KEY: ${VITE_YANDEX_MAPS_KEY}
    container_name: aeva-frontend-prod
    restart: unless-stopped
    mem_limit: 128m   # nginx со статикой
    cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: aeva-nginx-prod
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads_data:/uploads:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - default
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      # nginx сам роутит /api→backend, /p/<uuid>→backend, /uploads, /→frontend —
      # Traefik отдаёт ему весь Host целиком, разбиение путей не нужно
      - "traefik.http.routers.aeva.rule=Host(`aeva-eat.ru`)"
      - "traefik.http.routers.aeva.entrypoints=websecure"
      - "traefik.http.routers.aeva.tls=true"
      - "traefik.http.routers.aeva.tls.certresolver=letsencrypt"
      - "traefik.http.routers.aeva.service=aeva"
      - "traefik.http.services.aeva.loadbalancer.server.port=80"
      # www → 301 на apex (http→https — глобальный редирект в traefik.yml)
      - "traefik.http.routers.aeva-www.rule=Host(`www.aeva-eat.ru`)"
      - "traefik.http.routers.aeva-www.entrypoints=websecure"
      - "traefik.http.routers.aeva-www.tls=true"
      - "traefik.http.routers.aeva-www.tls.certresolver=letsencrypt"
      - "traefik.http.routers.aeva-www.service=aeva"
      - "traefik.http.routers.aeva-www.middlewares=aeva-www-redir"
      - "traefik.http.middlewares.aeva-www-redir.redirectregex.regex=^https://www\\.(.+)"
      - "traefik.http.middlewares.aeva-www-redir.redirectregex.replacement=https://$${1}"
      - "traefik.http.middlewares.aeva-www-redir.redirectregex.permanent=true"
    restart: unless-stopped
    mem_limit: 128m
    cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
  proxy:
    external: true

volumes:
  pg_data:
  uploads_data:
