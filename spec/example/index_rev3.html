<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <title>AEVA Eat — концепты v3</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Caveat:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="scrapbook.css"/>
  <style>
    html, body { margin: 0; padding: 0; }
    body { background: #f0eee9; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="variants.jsx"></script>
  <script type="text/babel" src="v2.jsx"></script>
  <script type="text/babel" src="v3.jsx"></script>

  <script type="text/babel">
    const { DesignCanvas, DCSection, DCArtboard, DCPostIt } = window;

    function PhoneFrame({ children }) {
      return (
        <IOSDevice width={402} height={874}>
          <div style={{ height: '100%', position: 'relative', background: 'var(--paper)' }}>
            {children}
          </div>
        </IOSDevice>
      );
    }

    function App() {
      return (
        <DesignCanvas>
          {/* v3 — pain-point drawings */}
          <DCSection
            id="v3"
            title="v3 · точки боли"
            subtitle="5 экранов где концепт расходится с реализацией"
          >
            <DCArtboard id="photofree" label="безфотный артефакт · 3 раскладки" width={402} height={874}>
              <PhoneFrame><PhotoFreeCard/></PhoneFrame>
            </DCArtboard>

            <DCArtboard id="city" label="город как путеводитель" width={402} height={874}>
              <PhoneFrame><CityGuide/></PhoneFrame>
            </DCArtboard>

            <DCArtboard id="gems" label="жемчужины-сокровищница" width={402} height={874}>
              <PhoneFrame><GemsHub/></PhoneFrame>
            </DCArtboard>

            <DCArtboard id="share" label="/p/:id · share — переработанный" width={402} height={874}>
              <PhoneFrame><PublicShare/></PhoneFrame>
            </DCArtboard>

            <DCArtboard id="place-header" label="шапка места · до/после" width={402} height={874}>
              <PhoneFrame><PlaceHeaderBA/></PhoneFrame>
            </DCArtboard>

            <DCPostIt x={2100} y={40} w={280}>
              v3 — что отрисовано после первого ревью реализации.
              Безфотный артефакт — компонент, остальные четыре — экраны.
              На любом артборде ⤢ — фуллскрин.
            </DCPostIt>
          </DCSection>

          {/* v2 — original main screen (kept for context) */}
          <DCSection
            id="v2"
            title="v2 · главный экран"
            subtitle="изначальная отрисовка Доски"
          >
            <DCArtboard id="v2-board" label="доска (исходный концепт)" width={402} height={874}>
              <PhoneFrame><V2/></PhoneFrame>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
