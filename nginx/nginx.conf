upstream backend {
    server backend:8085;
}

upstream frontend {
    server frontend:5173;
}

# Conditional Connection: upgrade — иначе пропускаем заголовок (для обычного HTTP).
# Vite HMR в dev-режиме открывает WebSocket на root-пути, а не на /ws,
# поэтому upgrade нужен в location /, а не только в /ws.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name localhost;

    client_max_body_size 25M;

    # Uploaded images
    location /uploads/ {
        alias /uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # API requests → Go backend
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vite HMR websocket — оставляем явный upgrade, на всякий случай
    # (некоторые конфиги Vite используют /ws).
    location /ws {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Everything else → Vue frontend.
    # Поддерживаем WS-upgrade на корне — Vite dev-server открывает HMR-канал
    # как ws upgrade на тот же путь, что и HTML. Без этого через ngrok
    # клиент крутит реконнект и страница рефрешится сама собой.
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
