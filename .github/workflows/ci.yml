name: CI

# Гейт качества. Запускается:
#  - на PR в master  → обязательная проверка для auto-merge (см. branch protection)
#  - на push в master/dev → быстрая обратная связь по веткам
on:
  pull_request:
    branches: [master]
  push:
    branches: [master, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Go vet + build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # версия берётся из backend/go.mod (go 1.25.x) — не дублируем число
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      # Тесты юнит-уровня (httptest + чистые функции), реальная БД не нужна
      - name: go test
        run: go test ./... -count=1

  migrations:
    name: Migrations (real Postgres boot)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aeva_eat
          POSTGRES_USER: aeva
          POSTGRES_PASSWORD: aeva_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aeva -d aeva_eat"
          --health-interval 5s --health-timeout 5s --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      # Реально накатываем все миграции на чистый Postgres: ловим сломанный или
      # не-идемпотентный SQL ДО прода (unit-тесты этого не проверяют).
      - name: Build
        run: go build -o /tmp/api ./cmd/api
      - name: Boot backend → run migrations
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: aeva
          DB_PASSWORD: aeva_secret
          DB_NAME: aeva_eat
          DB_SSLMODE: disable
          JWT_SECRET: ci-secret-ci-secret-ci-secret-ci-secret
          APP_ENV: development
          API_PORT: "8085"
        run: |
          /tmp/api & SRV=$!
          ok=0
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:8085/api/health >/dev/null 2>&1; then ok=1; break; fi
            sleep 1
          done
          kill $SRV 2>/dev/null || true
          [ "$ok" = "1" ] || { echo "backend не поднялся — миграции упали"; exit 1; }
      - name: Verify ledger + idempotent restart
        env:
          PGPASSWORD: aeva_secret
        run: |
          n=$(psql -h localhost -U aeva -d aeva_eat -tA -c "SELECT count(*) FROM schema_migrations;")
          echo "applied migrations: $n"
          [ "$n" -ge 16 ] || { echo "леджер не заполнен ($n)"; exit 1; }

  frontend:
    name: Frontend (ESLint + Vite build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: ESLint (--max-warnings 0)
        run: npm run lint

      - name: Vite build
        env:
          VITE_API_URL: /api
          # Ключ карт нужен только в рантайме; для сборки пустого достаточно.
          # Если задан секрет — подставится, нет — соберётся без него.
          VITE_YANDEX_MAPS_KEY: ${{ secrets.VITE_YANDEX_MAPS_KEY }}
        run: npm run build
