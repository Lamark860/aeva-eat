name: CI

# Гейт качества. Запускается:
#  - на PR в master  → обязательная проверка для auto-merge (см. branch protection)
#  - на push в master/dev → быстрая обратная связь по веткам
on:
  pull_request:
    branches: [master]
  push:
    branches: [master, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Go vet + build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # версия берётся из backend/go.mod (go 1.25.x) — не дублируем число
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      # Тесты юнит-уровня (httptest + чистые функции), реальная БД не нужна
      - name: go test
        run: go test ./... -count=1

  frontend:
    name: Frontend (ESLint + Vite build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: ESLint (--max-warnings 0)
        run: npm run lint

      - name: Vite build
        env:
          VITE_API_URL: /api
          # Ключ карт нужен только в рантайме; для сборки пустого достаточно.
          # Если задан секрет — подставится, нет — соберётся без него.
          VITE_YANDEX_MAPS_KEY: ${{ secrets.VITE_YANDEX_MAPS_KEY }}
        run: npm run build
