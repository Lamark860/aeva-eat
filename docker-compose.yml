version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: aeva-postgres
    environment:
      POSTGRES_DB: aeva_eat
      POSTGRES_USER: aeva
      POSTGRES_PASSWORD: aeva_secret
    ports:
      - "5434:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aeva -d aeva_eat"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aeva-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: aeva
      DB_PASSWORD: aeva_secret
      DB_NAME: aeva_eat
      DB_SSLMODE: disable
      JWT_SECRET: change-me-in-production-please
      API_PORT: 8085
    ports:
      - "8086:8085"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aeva-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=/api

  nginx:
    image: nginx:alpine
    container_name: aeva-nginx
    ports:
      - "8091:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads_data:/uploads:ro
    depends_on:
      - backend
      - frontend

volumes:
  pg_data:
  uploads_data:
